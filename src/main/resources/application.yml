spring:
  application:
    name: rokdemo

  thymeleaf:
    cache: false

  mvc:
    view:
      prefix: classpath:/templates/
      suffix: .html

  # 데이터베이스 설정
  datasource:
    url: ${DB_URL:jdbc:h2:mem:testdb}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}

  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update} # 개발: update, 프로덕션: validate
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
    open-in-view: false

  # H2 콘솔 (개발용)
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
      path: /h2-console

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-change-this-in-production-must-be-at-least-256-bits}
  expiration: ${JWT_EXPIRATION:86400000} # 24시간 (밀리초)

server:
  port: 8087

# 로깅 설정
logging:
  level:
    org.hibernate.SQL: ${LOG_SQL:debug}
    org.hibernate.type.descriptor.sql.BasicBinder: ${LOG_SQL_PARAMS:trace}
